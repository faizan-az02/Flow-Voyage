x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.2
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    - ./requirements.txt:/requirements.txt
  depends_on:
    - postgres

services:

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

  # airflow-init:
  #   <<: *airflow-common
  #   entrypoint: /bin/bash
  #   command: >
  #     -c "
  #     pip install -r /requirements.txt &&
  #     airflow db migrate &&
  #     airflow users create
  #     --username airflow
  #     --password airflow
  #     --firstname admin
  #     --lastname admin
  #     --role Admin
  #     --email admin@example.com
  #     "

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler